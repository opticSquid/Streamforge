worker_processes auto;
rtmp_auto_push on;
events {}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # HTTP callback when stream starts
            on_publish http://host.docker.internal:8081/on_publish;

            # HTTP callback when stream ends
            on_publish_done http://host.docker.internal:8081/on_publish_done;

            # Reject the stream if callback returns non-2xx
            # (nginx-rtmp does this by default)
        }
    }
}

http {
    server {
        listen 8080;
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
    }
}
