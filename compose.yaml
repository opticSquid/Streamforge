services:
  ingest-server:
    image: tiangolo/nginx-rtmp:latest-2026-05-25
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./hls:/var/hls
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required only if you are running this on linux

  # transcoding-server:
  #   ports:
  #     - "8081:8081"

  # delivery-server:
  #   ports:
  #     - "8082:8082"

  # ad-server:
  #   ports:
  #     - "8083:8083"

  # qoe-server:
  #   ports:
  #     - "8084:8084"

  otel-collector:
    image: otel/opentelemetry-collector:0.153.0-amd64
    ports:
      - "4317:4317"

  mimir:
    image: grafana/mimir:3.0.6
    ports:
      - "9009:9009"

  grafana:
    image: grafana/grafana:13.0.1-security-01
    ports:
      - "3000:3000"
